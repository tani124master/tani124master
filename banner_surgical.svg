<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <style>
      .bp-line { stroke: #cfe0ef; stroke-width: 1.4; fill: none; }
      .bp-line-thin { stroke: #8fb3d1; stroke-width: 0.8; fill: none; }
      .bp-dash { stroke: #6f93b4; stroke-width: 0.7; fill: none; stroke-dasharray: 3 3; }
      .bp-text { font-family: 'Courier New', monospace; fill: #dce9f5; }
      .bp-label { font-family: 'Courier New', monospace; fill: #7fa3c4; font-size: 11px; letter-spacing: 1px; }
      .bp-num { font-family: 'Courier New', monospace; fill: #7fa3c4; font-size: 10px; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="#0c2340"/>
  <rect x="12" y="12" width="1176" height="396" fill="none" stroke="#3a5a7a" stroke-width="1.5"/>
  <rect x="18" y="18" width="1164" height="384" fill="none" stroke="#3a5a7a" stroke-width="0.6"/>

  <text x="600" y="52" text-anchor="middle" class="bp-text" font-size="26" letter-spacing="5" font-weight="bold">SINGLE-PORT SURGICAL ROBOT</text>
  <text x="600" y="72" text-anchor="middle" class="bp-label" font-size="12">PATENT PENDING &#183; TELEOPERATED LAPAROSCOPIC PLATFORM</text>
  <line x1="60" y1="86" x2="1140" y2="86" class="bp-line-thin"/>

  <!-- central robotic arm assembly -->
  <g transform="translate(560,120)">
    <!-- base -->
    <rect x="20" y="200" width="120" height="24" rx="3" class="bp-line"/>
    <circle cx="80" cy="200" r="10" class="bp-line-thin"/>
    <!-- linkage segments -->
    <line x1="80" y1="200" x2="80" y2="150" class="bp-line"/>
    <circle cx="80" cy="150" r="6" class="bp-line-thin"/>
    <line x1="80" y1="150" x2="30" y2="100" class="bp-line"/>
    <circle cx="30" cy="100" r="6" class="bp-line-thin"/>
    <line x1="30" y1="100" x2="90" y2="60" class="bp-line"/>
    <circle cx="90" cy="60" r="6" class="bp-line-thin"/>
    <line x1="90" y1="60" x2="60" y2="10" class="bp-line"/>
    <!-- end effector: two jaws -->
    <g transform="translate(60,10)">
      <line x1="0" y1="0" x2="-18" y2="-22" class="bp-line-thin"/>
      <line x1="0" y1="0" x2="18" y2="-22" class="bp-line-thin"/>
      <circle cx="0" cy="0" r="4" class="bp-line-thin"/>
    </g>
    <!-- second arm mirrored -->
    <line x1="80" y1="150" x2="130" y2="105" class="bp-line-thin"/>
    <circle cx="130" cy="105" r="5" class="bp-line-thin"/>
    <line x1="130" y1="105" x2="150" y2="55" class="bp-line-thin"/>
    <g transform="translate(150,55)">
      <line x1="0" y1="0" x2="-12" y2="-18" class="bp-line-thin"/>
      <line x1="0" y1="0" x2="14" y2="-18" class="bp-line-thin"/>
    </g>
    <!-- camera arm -->
    <line x1="80" y1="150" x2="20" y2="60" class="bp-line-thin"/>
    <circle cx="20" cy="55" r="8" class="bp-line-thin"/>
    <line x1="20" y1="47" x2="20" y2="30" class="bp-line-thin"/>
    <polygon points="10,30 30,30 20,15" class="bp-line-thin"/>

    <!-- callout leader lines with numbers -->
    <line x1="80" y1="200" x2="200" y2="215" class="bp-dash"/>
    <text x="205" y="219" class="bp-num">10 — BASE UNIT</text>

    <line x1="30" y1="100" x2="220" y2="110" class="bp-dash"/>
    <text x="225" y="114" class="bp-num">22 — SHOULDER JOINT</text>

    <line x1="60" y1="10" x2="220" y2="30" class="bp-dash"/>
    <text x="225" y="34" class="bp-num">31 — END EFFECTOR (JAWS)</text>

    <line x1="20" y1="30" x2="-150" y2="45" class="bp-dash"/>
    <text x="-320" y="49" class="bp-num">40 — STEREO CAMERA HEAD</text>

    <line x1="150" y1="55" x2="220" y2="70" class="bp-dash"/>
    <text x="225" y="74" class="bp-num">27 — SECONDARY ARM</text>
  </g>

  <line x1="60" y1="345" x2="1140" y2="345" class="bp-line-thin"/>
  <text x="60" y="370" class="bp-label" font-size="11">INVENTOR / MAINTAINER</text>
  <text x="60" y="392" class="bp-text" font-size="16" letter-spacing="1">TANISHQ BANSAL</text>
  <text x="1140" y="370" text-anchor="end" class="bp-label" font-size="11">GITHUB</text>
  <text x="1140" y="392" text-anchor="end" class="bp-text" font-size="16" letter-spacing="1">@tani124master</text>
</svg>
